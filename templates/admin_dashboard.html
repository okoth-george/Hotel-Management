<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        
        /* Flash Message Styling */
        .flash-messages {
            position: fixed;
            top: 10px; /* Appear at the top */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            display: none; /* Initially hidden */
        }

        /* Success Message */
        .flash-success {
            background-color: #28a745;
            color: white;
        }

        /* Error Message */
        .flash-error {
            background-color: #dc3545;
            color: white;
        }

        /* Show flash messages */
        .flash-messages.show {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        h2 {
            color: #007bff;
            margin-bottom: 20px;
        }
        .menu {
            list-style-type: none;
            padding: 0;
        }
        .menu li {
            margin: 15px 0;
        }
        .menu a {
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            display: block;
            padding: 12px;
            border-radius: 10px;
            color: white;
            background-color: #007bff;
            transition: 0.3s;
        }
        .menu a:hover {
            background-color: #0056b3;
        }
        .logout-btn {
            display: block;
            margin-top: 20px;
            padding: 10px;
            background-color: red;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=True) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="dashboard-container">
    <h2>Admin Dashboard</h2>
    <ul class="menu">
        <li><a href="/admin/users">Manage Users</a></li>
        <li><a href="/admin/food">Manage Food Menu</a></li>
    </ul>
    <a href="/logout" class="logout-btn">Logout</a>
</div>

</body>
</html>
