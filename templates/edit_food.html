<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Food Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
         /* Flash Message Styling */
         .flash-messages {
            position: fixed;
            top: 10px; /* Appear at the top */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            display: none; /* Initially hidden */
        }

        /* Success Message */
        .flash-success {
            background-color: #28a745;
            color: white;
        }

        /* Error Message */
        .flash-error {
            background-color: #dc3545;
            color: white;
        }

        /* Show flash messages */
        .flash-messages.show {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }


        .card {
            max-width: 600px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-messages flash-{{ category }} show">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="container">
        <div class="card">
            <h2 class="text-center text-primary mb-4">Edit Food Item</h2>
            <form method="POST" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Food Name</label>
                    <input type="text" class="form-control border-2 rounded-3" id="name" name="name" value="{{ food.name }}" required>
                </div>
                <div class="mb-3">
                    <label for="price" class="form-label fw-bold">Price</label>
                    <input type="number" class="form-control border-2 rounded-3" id="price" name="price" value="{{ food.price }}" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">Description</label>
                    <textarea class="form-control border-2 rounded-3" id="description" name="description" rows="3" required>{{ food.description }}</textarea>
                </div>
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary px-4 py-2 rounded-3 shadow-sm">Update Food</button>
                    <a href="{{ url_for('manage_food') }}" class="btn btn-outline-secondary px-4 py-2 rounded-3 shadow-sm">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let flashMessages = document.querySelectorAll(".flash-messages");
            flashMessages.forEach(function (msg) {
                msg.classList.add("show");
                setTimeout(function () {
                    msg.style.display = "none";
                }, 3000); // Hide after 4 seconds
            });
        });
    </script>


</body>
</html>
