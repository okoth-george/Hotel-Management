<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #28a745, #007bff);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* Flash Message Styling */
        .flash-messages {
            position: fixed;
            top: 10px; /* Appear at the top */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            display: none; /* Initially hidden */
        }

        /* Success Message */
        .flash-success {
            background-color: #28a745;
            color: white;
        }

        /* Error Message */
        .flash-error {
            background-color: #dc3545;
            color: white;
        }

        /* Show flash messages */
        .flash-messages.show {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            width: 400px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 18px;
            color: white;
            background-color: #ffcc00; /* Yellow buttons */
            border: none;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #ffaa00;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=True) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

    <div class="container">
        <h1>login Successful!</h1>
        <h2>Welcome to Our Restaurant</h2>
        
        <a href="/menu" class="btn">🍽️ View Menu</a>
        <a href="/" class="btn">🏠 Home</a>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let flashMessages = document.querySelectorAll(".flash-messages");
            flashMessages.forEach(function (msg) {
                msg.classList.add("show");
                setTimeout(function () {
                    msg.style.display = "none";
                }, 3000); // Hide after 4 seconds
            });
        });
    </script>


</body>

</html>
