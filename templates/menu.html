<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Menu</title>
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        /* General Styles */
        body {
            background: linear-gradient(to right, #2C3E50, #4CA1AF); /* Modern gradient */
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
        }

        /* Table Styling */
        table {
            width: 80%;
            max-width: 800px;
            margin: 0 auto; /* Centering the table */
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f39c12; /* Orange header */
            color: white;
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #f39c12;
            color: white;
        }

        /* Button Styling */
        .btn {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            margin: 15px 10px;
            transition: all 0.3s ease;
            width: 200px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background: #218838;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🍽️ Food Menu</h1>

    {% if menu %}
        <table>
            <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Price ($)</th>
            </tr>
            {% for item in menu %}
                <tr>
                    <td>{{ item[0] }}</td>
                    <td>{{ item[1] }}</td>
                    <td>{{ item[2] }}</td>
                </tr>
            {% endfor %}
        </table>
    {% else %}
        <p style="color: white; font-size: 18px;">No food items available.</p>
    {% endif %}

    <div>
        <a href="{{ url_for('odd.order') }}"class="btn">Place Order</a>
        <a href="/" class="btn">🏠 Home</a>
    </div>
</body>
</html>
